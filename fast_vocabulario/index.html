<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rapidez en vocabulario — GED</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    :root {
      --cp: #0089cd; --cs: #005f8f; --ch: #00a8fc;
    }
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0; padding: 10px;
      background: linear-gradient(135deg, #0089cd, #002d4d);
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 90vh; flex-direction: column; gap: 10px;
    }
    #quiz-container {
      background: #fff; border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      overflow: hidden; width: clamp(300px, 95%, 820px);
      margin: 0 auto;
    }
    .quiz-progress-header {
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      padding: 16px 22px; border-bottom: 3px solid var(--cp);
    }
    .progress-text {
      text-align: center; font-weight: 700;
      font-size: clamp(0.95em, 2.5vw, 1.1em);
      color: var(--cp); margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .progress-container {
      background: #e0e0e0; height: 12px; border-radius: 6px;
      overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
    }
    .progress-bar {
      height: 100%; width: 5%;
      background: linear-gradient(90deg, var(--cp), var(--ch));
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1); border-radius: 6px;
    }
    .question-meta {
      display: flex; align-items: center; justify-content: center;
      padding: 14px 20px 0; gap: 10px; flex-wrap: wrap;
    }
    .cat-badge {
      padding: 5px 15px; border-radius: 20px;
      font-size: 0.8em; font-weight: 700; color: #fff;
      letter-spacing: 0.4px;
    }
    .time-badge {
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.78em; font-weight: 600;
      background: #e8f4f8; color: #444;
      border: 1px solid #ccc;
    }
    .question-header {
      padding: 16px 22px 8px;
      font-size: clamp(1em, 2.6vw, 1.18em);
      font-weight: 700; text-align: center;
      color: #1a1a2e; line-height: 1.55;
    }
    .word-box {
      background: linear-gradient(135deg, #f0f7ff, #e4effc);
      border: 2px solid var(--cp); border-radius: 10px;
      margin: 0 22px 14px; padding: 16px 18px;
      font-size: clamp(1.05em, 2.6vw, 1.15em);
      font-weight: 500; text-align: left;
      color: #003366;
      line-height: 1.6;
      letter-spacing: 0.01em;
    }
    .word-box .palabra {
      background: #fff59d;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      font-style: italic;
    }
    .word-box .blank {
      display: inline-block;
      min-width: 70px;
      border-bottom: 3px solid var(--cp);
      color: #888;
      font-style: italic;
      padding: 0 6px;
      text-align: center;
    }

    .options { padding: 0 18px; }
    .option-item {
      display: block; padding: 12px 16px; margin-bottom: 11px;
      background: #f0f4f8; color: #333;
      border: 2px solid #e0e0e0; border-radius: 8px;
      cursor: pointer; transition: all 0.25s ease;
      font-size: clamp(0.92em, 2.3vw, 1.05em);
      font-weight: 500; line-height: 1.5; user-select: none;
    }
    .option-item:hover:not(.disabled) {
      background: #dff0ff; border-color: var(--ch);
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .option-item.correct  { background: #4caf50!important; color:#fff!important; border-color:#4caf50!important; }
    .option-item.incorrect{ background: #f44336!important; color:#fff!important; border-color:#f44336!important; }
    .option-item.disabled { cursor: not-allowed; opacity: 0.85; }
    .option-letter { font-weight: 700; margin-right: 6px; color: var(--cs); }
    .option-item.correct .option-letter,
    .option-item.incorrect .option-letter { color: #fff; }

    .btn-container { padding: 4px 18px 18px; }
    .primary-btn {
      display: block; width: 100%; padding: 13px;
      color: #fff; border: none; border-radius: 8px;
      font-size: 1.05em; font-weight: 700; cursor: pointer;
      transition: all 0.25s ease; text-transform: uppercase;
      letter-spacing: 1px; background: var(--cp);
      text-align: center; user-select: none; box-sizing: border-box;
    }
    .primary-btn:hover {
      background: var(--ch); transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .timer-container {
      background: linear-gradient(135deg, #fff8e1, #ffecb3);
      padding: 11px 18px; border-top: 2px solid #f39c12;
    }
    .timer-text {
      text-align: center; font-weight: 700;
      font-size: clamp(0.88em, 2.2vw, 1em);
      color: #c77a00; margin-bottom: 7px;
    }
    .timer-bar-container {
      background: #f0d0d0; height: 8px; border-radius: 4px; overflow: hidden;
    }
    .timer-bar {
      height: 100%; width: 100%;
      background: linear-gradient(90deg,#28a745,#ffc107,#dc3545);
      transition: width 0.1s linear; border-radius: 4px;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.65} }
    .timer-warning { animation: pulse 0.9s infinite; }
    .result-screen { padding: 35px 28px; text-align: center; }
    .result-screen.hidden { display: none; }
    .result-screen h2 { color: var(--cp); font-size: clamp(1.4em,4vw,1.9em); margin-bottom: 10px; }
    .result-score {
      font-size: clamp(2em,6vw,2.8em)!important;
      font-weight: 800; color: var(--cp)!important; margin: 12px 0!important;
    }
    .result-msg { font-size: clamp(1em,2.8vw,1.2em); color:#333; margin:8px 0; }
    .cat-results { margin: 18px 0; text-align: left; }
    .cat-results h3 { color: var(--cp); font-size: 0.95em; margin-bottom: 10px; }
    .cat-row { display:flex; align-items:center; gap:8px; margin:7px 0; }
    .cat-lbl { flex:1.3; font-size:0.78em; font-weight:600; }
    .cat-bar-out { flex:2; background:#eee; border-radius:4px; height:10px; }
    .cat-bar-in { height:100%; border-radius:4px; background:var(--cp); transition:width 0.6s; }
    .cat-sc { font-weight:700; color:var(--cp); font-size:0.82em; min-width:38px; text-align:right; }
    .tip-box {
      background:#e8f5e9; border-left:4px solid #43a047;
      border-radius:6px; padding:10px 14px; margin:14px 0 4px;
      font-size:0.82em; color:#2e7d32; text-align:left; line-height:1.5;
    }
  </style>
</head>
<body>
<div id="quiz-container">

  <div class="quiz-progress-header">
    <div class="progress-text" id="progress-text">Pregunta 1 de 20</div>

      <div class="progress-bar" id="progress-bar"></div>
    </div>

  <div id="question-area"></div>

  <div class="timer-container" id="timer-container">

    <div class="timer-bar-container">
      <div class="timer-bar" id="timer-bar"></div>
    </div>
  </div>

  <div class="result-screen hidden" id="result-screen">
    <h2>🎯 ¡Cuestionario completado!</h2>

    <p class="result-msg" id="final-msg"></p>
    <div class="cat-results" id="cat-results"></div>

      <div class="primary-btn" id="restart-btn">🔄 Nuevas preguntas (reiniciar)</div>
    </div>

 <p style="text-align: center">Creado por Prof. José M. Fernández con Claude Opus 4.7</p>

<script>
(function(){
  if(window.quizVocabularioIniciado) return;
  window.quizVocabularioIniciado = true;

  function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
  function pick(arr){ return arr[rand(0,arr.length-1)]; }
  function shuffle(arr){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function makeOpts(correct, distractors){
    const cs=String(correct), seen=new Set([cs]), uniq=[];
    for(const d of distractors){
      if(d==null) continue;
      const ds=String(d);
      if(ds==='undefined' || ds==='') continue;
      if(!seen.has(ds) && uniq.length<3){ seen.add(ds); uniq.push(ds); }
    }
    let attempts=0;
    while(uniq.length<3 && attempts<30){
      attempts++;
      const fake=cs+'·'+attempts;
      if(!seen.has(fake)){ seen.add(fake); uniq.push(fake); }
    }
    while(uniq.length<3){ uniq.push('?'+uniq.length); }
    const all=shuffle([cs, ...uniq]);
    const L=['a','b','c','d'];
    return {
      opciones: all.map((v,i)=>({valor:L[i], texto:v, letra:L[i].toUpperCase()})),
      correcta: L[all.indexOf(cs)]
    };
  }

  /* ─── BANCOS ─── */

  // Sinónimos: palabra subrayada en contexto + sinónimo correcto + 3 distractores
  const SINONIMOS = [
    {oracion:'El maestro fue muy estricto con los estudiantes', palabra:'estricto', sinonimo:'severo', distractores:['amable','divertido','tímido']},
    {oracion:'La casa era enorme y hermosa', palabra:'enorme', sinonimo:'gigantesca', distractores:['pequeña','ordinaria','frágil']},
    {oracion:'Su discurso fue conmovedor para todos', palabra:'conmovedor', sinonimo:'emotivo', distractores:['aburrido','breve','confuso']},
    {oracion:'El examen resultó complicado para muchos', palabra:'complicado', sinonimo:'difícil', distractores:['sencillo','corto','divertido']},
    {oracion:'María mostró una actitud valiente ante el peligro', palabra:'valiente', sinonimo:'audaz', distractores:['cobarde','tímida','perezosa']},
    {oracion:'El paisaje era hermoso al amanecer', palabra:'hermoso', sinonimo:'bello', distractores:['feo','ordinario','triste']},
    {oracion:'Pedro es un trabajador eficiente', palabra:'eficiente', sinonimo:'eficaz', distractores:['lento','distraído','flojo']},
    {oracion:'La explicación del profesor fue clara', palabra:'clara', sinonimo:'comprensible', distractores:['confusa','larga','breve']},
    {oracion:'Su respuesta fue breve y precisa', palabra:'breve', sinonimo:'corta', distractores:['extensa','vaga','larga']},
    {oracion:'El niño se mostró curioso ante el experimento', palabra:'curioso', sinonimo:'interesado', distractores:['aburrido','enojado','distraído']}
  ];

  // Antónimos
  const ANTONIMOS = [
    {oracion:'El edificio era alto y moderno', palabra:'alto', antonimo:'bajo', distractores:['grande','antiguo','colorido']},
    {oracion:'La sopa estaba caliente', palabra:'caliente', antonimo:'fría', distractores:['dulce','salada','espesa']},
    {oracion:'El examen fue fácil para todos', palabra:'fácil', antonimo:'difícil', distractores:['corto','aburrido','rápido']},
    {oracion:'María es muy alegre', palabra:'alegre', antonimo:'triste', distractores:['amable','seria','cansada']},
    {oracion:'El niño es valiente', palabra:'valiente', antonimo:'cobarde', distractores:['fuerte','tímido','curioso']},
    {oracion:'La maleta era pesada', palabra:'pesada', antonimo:'ligera', distractores:['grande','vieja','cara']},
    {oracion:'Su carácter es generoso', palabra:'generoso', antonimo:'egoísta', distractores:['amable','tranquilo','divertido']},
    {oracion:'El día estaba claro', palabra:'claro', antonimo:'oscuro', distractores:['nublado','frío','lluvioso']},
    {oracion:'La respuesta era correcta', palabra:'correcta', antonimo:'incorrecta', distractores:['breve','clara','extensa']},
    {oracion:'El agua estaba limpia', palabra:'limpia', antonimo:'sucia', distractores:['fría','dulce','cristalina']}
  ];

  // Significado por contexto: palabra + 4 significados, elegir el que aplica al contexto
  const POR_CONTEXTO = [
    {oracion:'La banda tocó una hermosa pieza musical', palabra:'pieza', correct:'composición', distractores:['habitación','parte','objeto']},
    {oracion:'El banco está cerca de mi casa', palabra:'banco', correct:'institución financiera', distractores:['asiento','grupo de peces','montículo']},
    {oracion:'Necesito una hoja para escribir', palabra:'hoja', correct:'papel', distractores:['parte de árbol','filo','espada']},
    {oracion:'El ratón comió el queso', palabra:'ratón', correct:'animal', distractores:['dispositivo de computadora','músculo','pequeño']},
    {oracion:'Movió el ratón para hacer clic', palabra:'ratón', correct:'dispositivo de computadora', distractores:['animal','músculo','herramienta']},
    {oracion:'Compré una manzana en el mercado', palabra:'manzana', correct:'fruta', distractores:['cuadra de la ciudad','color','marca de computadora']},
    {oracion:'Vivimos en la misma manzana', palabra:'manzana', correct:'cuadra de la ciudad', distractores:['fruta','color','medida']},
    {oracion:'Pagó con una moneda de oro', palabra:'moneda', correct:'pieza de dinero', distractores:['país','valor','metal']},
    {oracion:'La moneda nacional es estable', palabra:'moneda', correct:'sistema monetario de un país', distractores:['pieza de metal','dólar','valor']},
    {oracion:'El sol sale por el este', palabra:'sol', correct:'astro luminoso', distractores:['nota musical','moneda','planta']}
  ];

  // Palabras polisémicas: significados según contexto
  const POLISEMIAS = [
    {palabra:'cabeza', oracion1:'Le duele la cabeza después del estudio', sig1:'parte del cuerpo',
     oracion2:'Es la cabeza del proyecto', sig2:'líder o jefe'},
    {palabra:'pico', oracion1:'El pájaro tiene un pico amarillo', sig1:'parte de un ave',
     oracion2:'Subimos al pico de la montaña', sig2:'cima o punto más alto'},
    {palabra:'lengua', oracion1:'Saca la lengua para examinarte', sig1:'órgano del cuerpo',
     oracion2:'El español es una lengua hermosa', sig2:'idioma'},
    {palabra:'corona', oracion1:'El rey lleva una corona de oro', sig1:'objeto que se pone en la cabeza',
     oracion2:'La corona del árbol da mucha sombra', sig2:'parte superior de un árbol'},
    {palabra:'estrella', oracion1:'Las estrellas brillan en el cielo', sig1:'astro luminoso',
     oracion2:'Es la estrella del equipo', sig2:'persona destacada'}
  ];

  // Formal vs informal: oración informal → elegir versión formal
  const FORMAL_INFORMAL = [
    {informal:'pana', formal:'amigo', distractores:['enemigo','vecino','pariente']},
    {informal:'guagua', formal:'autobús', distractores:['carro','tren','barco']},
    {informal:'curro', formal:'trabajo', distractores:['descanso','escuela','viaje']},
    {informal:'plata', formal:'dinero', distractores:['metal','color','joya']},
    {informal:'chamba', formal:'empleo', distractores:['casa','familia','amistad']},
    {informal:'pibe', formal:'muchacho', distractores:['anciano','niña','adulto']},
    {informal:'chévere', formal:'excelente', distractores:['triste','aburrido','difícil']},
    {informal:'guay', formal:'estupendo', distractores:['feo','malo','triste']},
    {informal:'majo', formal:'agradable', distractores:['molesto','tímido','serio']}
  ];

  /* ─── CATEGORÍAS ─── */
  const CC={
    'Sinónimos':'#1a6ba0',
    'Antónimos':'#0e7a60',
    'Significado por contexto':'#c0522a',
    'Palabras polisémicas':'#7b2d8b',
    'Formal e informal':'#a01c1c'
  };
  const CI={
    'Sinónimos':'🔁',
    'Antónimos':'⚖️',
    'Significado por contexto':'🔍',
    'Palabras polisémicas':'🎭',
    'Formal e informal':'🎩'
  };
  const TIPS={
    'Sinónimos':'Consejo: los sinónimos son palabras con significado parecido. Lee la oración completa, no solo la palabra subrayada — el contexto te indica el matiz exacto que necesitas.',
    'Antónimos':'Consejo: los antónimos son palabras con significado opuesto. Cuidado con los distractores que son del mismo "campo semántico" pero NO son opuestos (ej: "alto" vs "antiguo" no son antónimos, "alto" vs "bajo" sí lo son).',
    'Significado por contexto':'Consejo: muchas palabras tienen varios significados. Lee toda la oración y pregúntate: ¿qué significado tiene SENTIDO aquí? Por ejemplo, "banco" puede ser asiento o institución financiera según el contexto.',
    'Palabras polisémicas':'Consejo: las palabras polisémicas tienen múltiples significados relacionados. La misma palabra puede referirse a diferentes cosas. Apóyate siempre en el contexto de la oración.',
    'Formal e informal':'Consejo: el español tiene registros distintos. Para el GED y la escritura formal, usa el lenguaje culto: "trabajo" en lugar de "chamba", "amigo" en lugar de "pana", "dinero" en lugar de "plata" o "lana".'
  };

  /* ─── GENERADORES (20) ─── */
  const GEN=[

    /* ════ SINÓNIMOS (4) ════ */

    /* 1, 2, 3, 4 */
    ()=>{
      const o=pick(SINONIMOS);
      const correct=o.sinonimo;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Sinónimos', t:30,
        q:'¿Cuál es el sinónimo de la palabra subrayada?',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(SINONIMOS);
      const correct=o.sinonimo;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Sinónimos', t:30,
        q:'¿Cuál palabra significa lo mismo que la subrayada?',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(SINONIMOS);
      const correct=o.sinonimo;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Sinónimos', t:30,
        q:'Elige la palabra equivalente a la subrayada:',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(SINONIMOS);
      const correct=o.sinonimo;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Sinónimos', t:30,
        q:'¿Qué palabra reemplaza correctamente la subrayada sin cambiar el sentido?',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },

    /* ════ ANTÓNIMOS (4) ════ */

    /* 5, 6, 7, 8 */
    ()=>{
      const o=pick(ANTONIMOS);
      const correct=o.antonimo;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Antónimos', t:30,
        q:'¿Cuál es el antónimo de la palabra subrayada?',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(ANTONIMOS);
      const correct=o.antonimo;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Antónimos', t:30,
        q:'¿Cuál palabra tiene el significado OPUESTO a la subrayada?',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(ANTONIMOS);
      const correct=o.antonimo;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Antónimos', t:30,
        q:'Elige la palabra contraria a la subrayada:',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(ANTONIMOS);
      const correct=o.antonimo;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Antónimos', t:30,
        q:'¿Cuál es lo contrario de la palabra subrayada?',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },

    /* ════ SIGNIFICADO POR CONTEXTO (4) ════ */

    /* 9, 10, 11, 12 */
    ()=>{
      const o=pick(POR_CONTEXTO);
      const correct=o.correct;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Significado por contexto', t:35,
        q:'¿Qué significa la palabra subrayada en esta oración?',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(POR_CONTEXTO);
      const correct=o.correct;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Significado por contexto', t:35,
        q:'Según el contexto, ¿qué significa la palabra subrayada?',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(POR_CONTEXTO);
      const correct=o.correct;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Significado por contexto', t:35,
        q:'¿Cuál es el significado correcto de la palabra subrayada en este contexto?',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(POR_CONTEXTO);
      const correct=o.correct;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Significado por contexto', t:35,
        q:'En esta oración, la palabra subrayada significa:',
        math:`${o.oracion.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },

    /* ════ PALABRAS POLISÉMICAS (4) ════ */

    /* 13, 14, 15, 16 */
    ()=>{
      const o=pick(POLISEMIAS);
      const tipo=rand(0,1);
      const oracionUsada = tipo===0 ? o.oracion1 : o.oracion2;
      const correct = tipo===0 ? o.sig1 : o.sig2;
      const otroSig = tipo===0 ? o.sig2 : o.sig1;
      // Distractores: el otro significado + 2 falsos
      const distractoresGenericos=['objeto','herramienta','color','medida','lugar','tiempo'];
      const ds=[otroSig, ...shuffle(distractoresGenericos).slice(0,2)];
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Palabras polisémicas', t:35,
        q:'¿Qué significa la palabra subrayada en esta oración?',
        math:`${oracionUsada.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(POLISEMIAS);
      const tipo=rand(0,1);
      const oracionUsada = tipo===0 ? o.oracion1 : o.oracion2;
      const correct = tipo===0 ? o.sig1 : o.sig2;
      const otroSig = tipo===0 ? o.sig2 : o.sig1;
      const distractoresGenericos=['objeto','herramienta','color','medida'];
      const ds=[otroSig, ...shuffle(distractoresGenericos).slice(0,2)];
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Palabras polisémicas', t:35,
        q:'En esta oración, la palabra subrayada se refiere a:',
        math:`${oracionUsada.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(POLISEMIAS);
      const tipo=rand(0,1);
      const oracionUsada = tipo===0 ? o.oracion1 : o.oracion2;
      const correct = tipo===0 ? o.sig1 : o.sig2;
      const otroSig = tipo===0 ? o.sig2 : o.sig1;
      const distractoresGenericos=['lugar','tiempo','número','sentimiento'];
      const ds=[otroSig, ...shuffle(distractoresGenericos).slice(0,2)];
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Palabras polisémicas', t:35,
        q:'¿Cuál es el significado de la palabra subrayada en este contexto?',
        math:`${oracionUsada.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },
    ()=>{
      // Mostrar la palabra y dos oraciones — preguntar qué oración usa el sig1/sig2
      const o=pick(POLISEMIAS);
      const tipo=rand(0,1);
      const correct = tipo===0 ? o.sig1 : o.sig2;
      const oracionUsada = tipo===0 ? o.oracion1 : o.oracion2;
      const otroSig = tipo===0 ? o.sig2 : o.sig1;
      const distractoresGenericos=['parte de un libro','sentimiento','cantidad'];
      const ds=[otroSig, ...shuffle(distractoresGenericos).slice(0,2)];
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Palabras polisémicas', t:35,
        q:'Según el contexto, ¿qué significa la palabra subrayada?',
        math:`${oracionUsada.replace(o.palabra, `<span class="palabra">${o.palabra}</span>`)}.`,
        opciones, correcta };
    },

    /* ════ FORMAL E INFORMAL (4) ════ */

    /* 17, 18, 19, 20 */
    ()=>{
      const o=pick(FORMAL_INFORMAL);
      const correct=o.formal;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Formal e informal', t:30,
        q:'¿Cuál es la palabra formal equivalente a la subrayada (informal)?',
        math:`<span class="palabra">${o.informal}</span>`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(FORMAL_INFORMAL);
      const correct=o.formal;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Formal e informal', t:30,
        q:'En lenguaje formal, ¿qué palabra usarías en lugar de la subrayada?',
        math:`<span class="palabra">${o.informal}</span>`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(FORMAL_INFORMAL);
      const correct=o.formal;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Formal e informal', t:30,
        q:'¿Cuál es el equivalente formal de esta palabra coloquial?',
        math:`<span class="palabra">${o.informal}</span>`,
        opciones, correcta };
    },
    ()=>{
      const o=pick(FORMAL_INFORMAL);
      const correct=o.formal;
      const ds=shuffle(o.distractores).slice(0,3);
      const {opciones,correcta}=makeOpts(correct,ds);
      return{ cat:'Formal e informal', t:30,
        q:'Para escritura formal del GED, ¿qué palabra reemplaza a esta?',
        math:`<span class="palabra">${o.informal}</span>`,
        opciones, correcta };
    }

  ];

  const preguntas=shuffle(GEN.map(g=>g()));
  const total=preguntas.length;
  let actual=0, puntos=0, respondida=false, reloj=null, segs=0;
  const catPts={}, catTot={};
  preguntas.forEach(p=>{ catTot[p.cat]=(catTot[p.cat]||0)+1; catPts[p.cat]=catPts[p.cat]||0; });

  const qArea=document.getElementById('question-area');
  const barP=document.getElementById('progress-bar');
  const txtP=document.getElementById('progress-text');

  function render(i){
    const p=preguntas[i];
    const col=CC[p.cat]||'#0089cd';
    const icon=CI[p.cat]||'📝';
    const tLabel= p.t<=30?'⚡ Rápida': p.t<=45?'🕐 Media':'⏳ Difícil';
    const opHtml=p.opciones.map(o=>
      `<div class="option-item" data-val="${o.valor}" onclick="window.__qClick(this)"><span class="option-letter">${o.letra}.</span>${o.texto}</div>`
    ).join('');
    const mathBlock=p.math?`<div class="word-box">${p.math}</div>`:'';
    const btnLbl=i===total-1?'Ver resultados':'Siguiente ›';
    qArea.innerHTML=`
      <div class="question-meta">
        <span class="cat-badge" style="background:${col}">${icon} ${p.cat}</span>
        <span class="time-badge">${tLabel} · ${p.t}s</span>
      </div>
      <div class="question-header">${p.q}</div>
      ${mathBlock}
      <div class="options">${opHtml}</div>
      <div class="btn-container">
        <div class="primary-btn" onclick="window.__qNext()">${btnLbl}</div>
      </div>`;
    if(barP) barP.style.width=((i+1)/total*100)+'%';
    if(txtP) txtP.textContent=`Pregunta ${i+1} de ${total}`;
    iniciarReloj(p.t);
  }

  window.__qClick=function(el){
    if(respondida) return;
    pararReloj(); respondida=true;
    const p=preguntas[actual];
    const elegida=el.getAttribute('data-val');
    if(elegida===p.correcta){
      el.className='option-item correct disabled';
      puntos++; catPts[p.cat]++;
    } else {
      el.className='option-item incorrect disabled';
      const ok=qArea.querySelector(`.option-item[data-val="${p.correcta}"]`);
      if(ok) ok.className='option-item correct disabled';
    }
    qArea.querySelectorAll('.option-item').forEach(o=>{
      if(!o.className.includes('disabled')) o.className+=' disabled';
    });
  };

  window.__qNext=function(){
    pararReloj(); actual++; respondida=false;
    if(actual<total) render(actual);
    else mostrarResultados();
  };

  function iniciarReloj(s){
    pararReloj(); segs=s; actualizarReloj();
    reloj=setInterval(()=>{ segs--; actualizarReloj(); if(segs<=0) tiempoAgotado(); },1000);
  }
  function pararReloj(){ if(reloj){clearInterval(reloj);reloj=null;} }
  function actualizarReloj(){
    const p=preguntas[actual]||{t:60};
    const tt=document.getElementById('timer-text');
    const tb=document.getElementById('timer-bar');
    const tc=document.getElementById('timer-container');
    if(tt) tt.textContent=`⏱ Tiempo: ${segs}s`;
    const pct=(segs/p.t)*100;
    if(tb){
      tb.style.width=pct+'%';
      if(pct<=25){ tb.style.background='#dc3545'; if(tc) tc.className='timer-container timer-warning'; }
      else if(pct<=50){ tb.style.background='linear-gradient(90deg,#ffc107,#dc3545)'; if(tc) tc.className='timer-container'; }
      else{ tb.style.background='linear-gradient(90deg,#28a745,#ffc107,#dc3545)'; if(tc) tc.className='timer-container'; }
    }
  }
  function tiempoAgotado(){
    pararReloj(); respondida=true;
    const p=preguntas[actual];
    const ok=qArea.querySelector(`.option-item[data-val="${p.correcta}"]`);
    if(ok) ok.className='option-item correct disabled';
    qArea.querySelectorAll('.option-item').forEach(o=>{ if(!o.className.includes('disabled')) o.className+=' disabled'; });
    const tt=document.getElementById('timer-text');
    if(tt) tt.textContent='⏰ ¡Tiempo agotado!';
    const tc=document.getElementById('timer-container');
    if(tc) tc.className='timer-container timer-warning';
  }

  function mostrarResultados(){
    pararReloj();
    qArea.innerHTML='';
    document.getElementById('timer-container').style.display='none';
    const pct=Math.round(puntos/total*100);
    document.getElementById('final-score').textContent=`${puntos} / ${total}  (${pct}%)`;
    let msg='', emoji='';
    if(pct>=85){ emoji='🏆'; msg='¡Excelente! Dominas el vocabulario del GED.'; }
    else if(pct>=70){ emoji='👍'; msg='¡Muy bien! Un poco más de práctica y lo logras.'; }
    else if(pct>=50){ emoji='💪'; msg='Buen intento. Repasa las categorías en rojo y vuelve a intentarlo.'; }
    else { emoji='📚'; msg='Sigue practicando. La lectura abundante es la mejor manera de ampliar tu vocabulario.'; }
    document.getElementById('final-msg').textContent=emoji+' '+msg;

    let html='<h3>Resultados por categoría:</h3>';
    for(const cat of Object.keys(catTot)){
      const s=catPts[cat]||0, t2=catTot[cat];
      const p2=Math.round(s/t2*100);
      const col=CC[cat]||'#0089cd';
      const barCol=p2>=70?col:'#e53935';
      html+=`<div class="cat-row">
        <span class="cat-lbl">${CI[cat]} ${cat}</span>
        <div class="cat-bar-out"><div class="cat-bar-in" style="width:${p2}%;background:${barCol}"></div></div>
        <span class="cat-sc">${s}/${t2}</span>
      </div>`;
    }
    document.getElementById('cat-results').innerHTML=html;

    let minCat='', minPct=999;
    for(const cat of Object.keys(catTot)){
      const s=catPts[cat]||0, t2=catTot[cat], pp=s/t2;
      if(pp<minPct){ minPct=pp; minCat=cat; }
    }
    document.getElementById('tip-box').textContent=
      minPct<1 ? (TIPS[minCat]||'') : '✅ ¡Sin categorías con puntuación 0! Sigue leyendo para ampliar tu vocabulario.';

    document.getElementById('result-screen').className='result-screen';
    document.querySelector('.quiz-progress-header').style.display='none';
    document.getElementById('restart-btn').onclick=()=>window.location.reload();
  }

  render(0);

})();
</script>
</body>
</html>
